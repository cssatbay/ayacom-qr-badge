<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYACOM — Вход</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

    <style>
        :root {
            --primary: #ED2424;
            --primary-hover: #D91E1E;
            --primary-soft: rgba(237, 36, 36, 0.06);
            --primary-border: rgba(237, 36, 36, 0.15);
            --bg: #FAFAFA;
            --white: #FFFFFF;
            --text: #111111;
            --text-secondary: #71717A;
            --text-muted: #A1A1AA;
            --border: #E4E4E7;
            --border-hover: #D4D4D8;
            --input-bg: #FFFFFF;
            --radius: 12px;
            --radius-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* ===== CARD ===== */
        .login-card {
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== LOGO ===== */
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-img {
            height: 40px;
            margin-bottom: 8px;
        }

        /* ===== FORM CONTAINER ===== */
        .form-container {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
        }

        .form-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }

        .form-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 28px;
        }

        /* ===== ALERTS ===== */
        .alert {
            display: none;
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 20px;
            align-items: center;
            gap: 10px;
            animation: alertIn 0.3s ease-out;
        }

        .alert.show { display: flex; }

        @keyframes alertIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert i { width: 18px; height: 18px; flex-shrink: 0; }

        .alert-error {
            background: #FEF2F2;
            border: 1px solid #FECACA;
            color: #DC2626;
        }

        .alert-success {
            background: #F0FDF4;
            border: 1px solid #BBF7D0;
            color: #16A34A;
        }

        /* ===== FORM ===== */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .input-icon i {
            width: 18px;
            height: 18px;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px 12px 44px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            outline: none;
            transition: all 0.2s;
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-input:hover {
            border-color: var(--border-hover);
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-soft);
        }

        .form-input:focus ~ .input-icon i {
            color: var(--primary);
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 2px;
            display: flex;
        }

        .password-toggle i {
            width: 18px;
            height: 18px;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .password-toggle:hover i {
            color: var(--text-secondary);
        }

        /* ===== OPTIONS ===== */
        .form-options {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            user-select: none;
        }

        .checkbox-label input { display: none; }

        .custom-check {
            width: 18px;
            height: 18px;
            border: 1.5px solid var(--border);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .custom-check i {
            width: 12px;
            height: 12px;
            color: white;
            opacity: 0;
            transition: all 0.2s;
        }

        .checkbox-label input:checked ~ .custom-check {
            background: var(--primary);
            border-color: var(--primary);
        }

        .checkbox-label input:checked ~ .custom-check i {
            opacity: 1;
        }

        /* ===== BUTTON ===== */
        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
        }

        .login-btn i {
            width: 18px;
            height: 18px;
        }

        .login-btn:hover {
            background: var(--primary-hover);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .login-btn.loading .btn-content {
            visibility: hidden;
        }

        .login-btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            margin-top: 24px;
        }

        .footer p {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 440px) {
            body { padding: 16px; }
            .form-container { padding: 24px; }
        }
    </style>
</head>
<body>

    <div class="login-card">

        <!-- Logo -->
        <div class="logo-section">
            <img src="/public/assets/logo.png" alt="AYACOM" class="logo-img">
            <!-- СЮДА ВСТАВЬ СВОЙ ЛОГОТИП: замени /admin/logo.png на свой путь -->
        </div>

        <!-- Form -->
        <div class="form-container">

            <h1 class="form-title">Вход в систему</h1>
            <p class="form-subtitle">Панель управления QR-бейджами</p>

            <!-- Alerts -->
            <div class="alert alert-error" id="alertError">
                <i data-lucide="alert-circle"></i>
                <span id="errorText"></span>
            </div>

            <div class="alert alert-success" id="alertSuccess">
                <i data-lucide="check-circle-2"></i>
                <span id="successText"></span>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">

                <!-- Username -->
                <div class="form-group">
                    <label class="form-label">Логин</label>
                    <div class="input-wrapper">
                        <input
                            type="text"
                            class="form-input"
                            id="username"
                            placeholder="Введите логин"
                            required
                            autocomplete="username"
                        >
                        <div class="input-icon">
                            <i data-lucide="user"></i>
                        </div>
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label class="form-label">Пароль</label>
                    <div class="input-wrapper">
                        <input
                            type="password"
                            class="form-input"
                            id="password"
                            placeholder="Введите пароль"
                            required
                            autocomplete="current-password"
                            style="padding-right: 44px;"
                        >
                        <div class="input-icon">
                            <i data-lucide="lock"></i>
                        </div>
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i data-lucide="eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- Options -->
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span class="custom-check">
                            <i data-lucide="check"></i>
                        </span>
                        Запомнить меня
                    </label>
                </div>

                <!-- Button -->
                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-content" style="display:flex;align-items:center;gap:8px;">
                        <i data-lucide="arrow-right"></i>
                        Войти
                    </span>
                </button>

            </form>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>© 2024 AYACOM</p>
        </div>

    </div>

    <script>
        lucide.createIcons();

        const API_URL = '/api';

        window.addEventListener('load', () => {
            const token = localStorage.getItem('adminToken');
            if (token) {
                window.location.href = '/admin/index.html';
            }

            const saved = localStorage.getItem('ayacom_username');
            if (saved) {
                document.getElementById('username').value = saved;
                document.getElementById('rememberMe').checked = true;
                document.getElementById('password').focus();
            } else {
                document.getElementById('username').focus();
            }
        });

        async function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const btn = document.getElementById('loginBtn');

            hideAlerts();

            if (!username) { showError('Введите логин'); return; }
            if (!password) { showError('Введите пароль'); return; }

            btn.classList.add('loading');
            btn.disabled = true;

            try {
                const res = await fetch(`${API_URL}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('ayacom_role', data.admin.role);
                    localStorage.setItem('ayacom_user', data.admin.username);

                    if (rememberMe) {
                        localStorage.setItem('ayacom_username', username);
                    } else {
                        localStorage.removeItem('ayacom_username');
                    }

                    showSuccess('Успешный вход! Перенаправляю...');
                    setTimeout(() => {
                        window.location.href = '/admin/index.html';
                    }, 800);
                } else {
                    showError(data.error || 'Неверный логин или пароль');
                }

            } catch (err) {
                showError('Ошибка соединения с сервером');
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        function showError(msg) {
            document.getElementById('errorText').textContent = msg;
            document.getElementById('alertError').classList.add('show');
            setTimeout(hideAlerts, 5000);
        }

        function showSuccess(msg) {
            document.getElementById('successText').textContent = msg;
            document.getElementById('alertSuccess').classList.add('show');
        }

        function hideAlerts() {
            document.getElementById('alertError').classList.remove('show');
            document.getElementById('alertSuccess').classList.remove('show');
        }

        document.getElementById('username').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); document.getElementById('password').focus(); }
        });
    </script>
</body>
</html>
